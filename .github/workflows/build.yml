---
name: Build

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "Distro (or all)"
        type: choice
        default: kicksecure
        options: [all, whonix, kicksecure]
      flavor:
        description: "Flavor (or all)"
        type: choice
        default: cli
        options: [all, cli, lxqt]
      target:
        description: "Target (or all)"
        type: choice
        default: raw
        options: [all, raw, virtualbox, iso]
      arch:
        description: "Arch (or all)"
        type: choice
        default: all
        options: [all, amd64, arm64]
      fast_build:
        description: "Fast build (remote prebuilt packages)"
        type: boolean
        default: true
  push:
    branches:
      - '**ci**'
    tags:
      - '*'

jobs:
  ## Expand the selectors into a matrix. On push/tag (no inputs) this
  ## defaults to the kicksecure-cli raw smoke set on both arches.
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1
      - name: Resolve build matrix
        id: gen
        run: |
          matrix="$(bash ./.github/scripts/resolve-build-matrix.sh \
            '${{ github.event.inputs.distro || 'kicksecure' }}' \
            '${{ github.event.inputs.flavor || 'cli' }}' \
            '${{ github.event.inputs.target || 'raw' }}' \
            '${{ github.event.inputs.arch || 'all' }}')"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"
          printf 'Resolved matrix:\n' && printf '%s' "$matrix" | jq .

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build ${{ matrix.name }}
        env:
          CI: "true"
        run: |
          ./docker/derivative-maker-docker-run -- \
            --flavor ${{ matrix.flavor }} \
            --target ${{ matrix.target }} \
            --type ${{ matrix.type }} \
            --arch ${{ matrix.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            --allow-unsigned true \
            ${{ github.event.inputs.fast_build == 'false' && ' ' || '--repo true --remote-derivative-packages true' }}

      - name: Upload build output + logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ~/binary_mnt/
          retention-days: 7
